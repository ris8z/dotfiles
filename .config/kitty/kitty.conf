# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #

# you can choose themes from $HOME/.config/kitty/kitty-themes/
include ./kitty-themes/00-Default.conf

# ---  PERFORMANCE BOOST  ---
repaint_delay 6
input_delay 1
sync_to_monitor no
enable_audio_bell no
visual_bell_duration 0.0

font_family FantasqueSansM Nerd Font Mono Bold
font_size 14.0
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 0.9
dynamic_background_opacity 1
confirm_os_window_close 0

linux_display_server wayland

scrollback_lines 2000
wheel_scroll_min_lines 1


# Zoom in
map ctrl+equal increase_font_size

# Zoom out
map ctrl+minus decrease_font_size

window_padding_width 4
# selection_foreground none
# selection_background none
# foreground #dddddd
# background #000000
# cursor #dddddd


# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
